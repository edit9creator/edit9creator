<!DOCTYPE html>
<html>
<head>
<title>Snap Editor</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}

img{
  max-width:300px;
  margin-top:20px;
  border-radius:10px;
}

.controls{
  margin-top:20px;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📸 Snap Photo Editor</h2>

<input type="file" id="fileInput">

<br>

<img id="img">

<div class="controls">
<button onclick="bright()">Brightness+</button>
<button onclick="dark()">Brightness-</button>
<button onclick="contrast()">Contrast</button>
<button onclick="blurImg()">Blur</button>
<button onclick="gray()">Grayscale</button>
<button onclick="reset()">Reset</button>
</div>

<script>
let img = document.getElementById("img");

document.getElementById("fileInput").addEventListener("change", function(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    img.src = reader.result;
  }

  if(file){
    reader.readAsDataURL(file);
  }
});

// filters
function bright(){
  img.style.filter = "brightness(150%)";
}

function dark(){
  img.style.filter = "brightness(70%)";
}

function contrast(){
  img.style.filter = "contrast(200%)";
}

function blurImg(){
  img.style.filter = "blur(2px)";
}

function gray(){
  img.style.filter = "grayscale(100%)";
}

function reset(){
  img.style.filter = "none";
}
</script>

</body>
</html>
